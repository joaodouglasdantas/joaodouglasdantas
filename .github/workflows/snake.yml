name: Generate Rainbow Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: joaodouglasdantas
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#ff6600&color_dots=#222,#ff0000,#ff9900,#00cc44,#0055ff

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}