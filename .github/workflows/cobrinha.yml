name: Generate Snake

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23ec4899&color_dots=%23ebedf0,%23ef4444,%23facc15,%2322c55e,%233b82f6
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23ec4899&color_dots=%23161b22,%23ef4444,%23facc15,%2322c55e,%233b82f6

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
